<!DOCTYPE html>
<html lang="fr">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="EF-FORT.BF — Préparation aux concours directs de la Fonction Publique du Burkina Faso. QCM, Examens Types, Entraide.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="theme-color" content="#1A5C38">

  <!-- Sécurité -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

  <!-- PWA / iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EF-FORT.BF">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="shortcut icon" href="favicon.png"/>

  <!-- Manifest PWA -->
  <title>EF-FORT.BF — Concours Burkina Faso</title>
  <link rel="manifest" href="manifest.json">

  <!-- Open Graph -->
  <meta property="og:title" content="EF-FORT.BF — Concours Burkina Faso">
  <meta property="og:description" content="Préparez les concours de la Fonction Publique du Burkina Faso avec EF-FORT.BF">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ef-fort-bf.pages.dev">
  <meta property="og:image" content="https://ef-fort-bf.pages.dev/icons/Icon-512.png">

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #0E3D24;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    #loading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      height: 100dvh;
      background: linear-gradient(180deg, #1A5C38 0%, #0E3D24 50%, #0a2b19 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .loading-logo {
      width: 100px;
      height: 100px;
      border-radius: 22px;
      background: white;
      padding: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 2px rgba(212,160,23,0.3);
      margin-bottom: 20px;
    }
    .loading-title {
      color: #D4A017;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .loading-subtitle {
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(212,160,23,0.25);
      border-top: 3px solid #D4A017;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Bannière installation PWA */
    #pwa-install-banner {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      background: linear-gradient(135deg, #1A5C38, #1e6b42);
      color: white;
      padding: 14px 16px;
      z-index: 9999;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
      border-top: 1px solid rgba(212,160,23,0.3);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    #pwa-install-banner.show { display: flex; align-items: center; gap: 12px; }
    .pwa-install-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: white; padding: 4px; flex-shrink: 0;
    }
    .pwa-install-text { flex: 1; }
    .pwa-install-text strong { display: block; font-size: 14px; font-weight: 700; }
    .pwa-install-text span { font-size: 12px; opacity: 0.8; }
    .pwa-install-btn {
      background: #D4A017; color: white; border: none;
      padding: 10px 16px; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 700; white-space: nowrap; flex-shrink: 0;
    }
    .pwa-dismiss-btn {
      background: rgba(255,255,255,0.15); color: white; border: none;
      padding: 8px 10px; border-radius: 8px; cursor: pointer;
      font-size: 12px; flex-shrink: 0;
    }

    /* Notification mise à jour */
    #update-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: linear-gradient(135deg, #D4A017, #b8860b);
      color: white;
      padding: 12px 16px;
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to { transform: translateY(0); }
    }
    #update-banner.show { display: block; }
  </style>
</head>
<body>
  <!-- Bannière mise à jour disponible -->
  <div id="update-banner">
    🔄 Mise à jour disponible — Cliquez pour actualiser
  </div>

  <!-- Bannière installation PWA Android -->
  <div id="pwa-install-banner">
    <img src="icons/Icon-192.png" alt="EF-FORT.BF" class="pwa-install-icon">
    <div class="pwa-install-text">
      <strong>Installer EF-FORT.BF</strong>
      <span>Accès rapide depuis votre écran d'accueil</span>
    </div>
    <button class="pwa-install-btn" id="pwa-install-btn">📲 Installer</button>
    <button class="pwa-dismiss-btn" id="pwa-dismiss-btn">✕</button>
  </div>

  <!-- Écran de chargement -->
  <div id="loading">
    <img src="icons/Icon-192.png" alt="EF-FORT.BF" class="loading-logo">
    <div class="loading-title">EF-FORT.BF</div>
    <div class="loading-subtitle">Préparation aux Concours · Burkina Faso</div>
    <div class="spinner"></div>
  </div>

  <!-- ════════════════════════════════════════════════════
       EF-FORT.BF — Web Audio API : Cloche sonore examen
       ════════════════════════════════════════════════════ -->
  <script>
    // ── Cloche sonore via Web Audio API ──
    window.effortPlayBell = function(frequency, durationSec) {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc1 = ctx.createOscillator();
        var gainNode1 = ctx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(frequency, ctx.currentTime);
        gainNode1.gain.setValueAtTime(0.6, ctx.currentTime);
        gainNode1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + durationSec);
        osc1.connect(gainNode1);
        gainNode1.connect(ctx.destination);
        var osc2 = ctx.createOscillator();
        var gainNode2 = ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(frequency * 2, ctx.currentTime);
        gainNode2.gain.setValueAtTime(0.3, ctx.currentTime);
        gainNode2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + durationSec * 0.7);
        osc2.connect(gainNode2);
        gainNode2.connect(ctx.destination);
        var osc3 = ctx.createOscillator();
        var gainNode3 = ctx.createGain();
        osc3.type = 'triangle';
        osc3.frequency.setValueAtTime(frequency * 1.5, ctx.currentTime);
        gainNode3.gain.setValueAtTime(0.15, ctx.currentTime);
        gainNode3.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + durationSec * 0.5);
        osc3.connect(gainNode3);
        gainNode3.connect(ctx.destination);
        osc1.start(ctx.currentTime); osc1.stop(ctx.currentTime + durationSec);
        osc2.start(ctx.currentTime); osc2.stop(ctx.currentTime + durationSec * 0.7);
        osc3.start(ctx.currentTime); osc3.stop(ctx.currentTime + durationSec * 0.5);
        setTimeout(function() { try { ctx.close(); } catch(e) {} }, (durationSec + 0.5) * 1000);
      } catch(e) { console.warn('EF-FORT Bell error:', e); }
    };

    window.effortPlayWelcomeMelody = function() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var notes = [
          { freq: 523.25, time: 0.0, dur: 0.35 },
          { freq: 659.25, time: 0.25, dur: 0.35 },
          { freq: 783.99, time: 0.50, dur: 0.55 },
          { freq: 1046.5, time: 0.85, dur: 1.2 },
        ];
        notes.forEach(function(note) {
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(note.freq, ctx.currentTime + note.time);
          gain.gain.setValueAtTime(0.0, ctx.currentTime + note.time);
          gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + note.time + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + note.time + note.dur);
          osc.connect(gain); gain.connect(ctx.destination);
          osc.start(ctx.currentTime + note.time);
          osc.stop(ctx.currentTime + note.time + note.dur);
        });
        setTimeout(function() { try { ctx.close(); } catch(e) {} }, 3000);
      } catch(e) { console.warn('EF-FORT Melody error:', e); }
    };

    window.effortPlayDoubleBell = function() {
      window.effortPlayBell(880, 1.5);
      setTimeout(function() { window.effortPlayBell(660, 2.0); }, 800);
    };

    // ── Masquer écran de chargement au premier rendu Flutter ──
    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('loading');
      if (loading) {
        loading.style.opacity = '0';
        loading.style.transition = 'opacity 0.4s ease';
        setTimeout(function() { if (loading) loading.remove(); }, 400);
      }
    });

    // ── PWA : Installer sur Android ──
    var deferredPrompt = null;
    var installBanner = document.getElementById('pwa-install-banner');
    var installBtn = document.getElementById('pwa-install-btn');
    var dismissBtn = document.getElementById('pwa-dismiss-btn');

    // Vérifier si déjà installé ou rejeté
    var dismissed = localStorage.getItem('pwa_install_dismissed');
    var isStandalone = window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true;

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      if (!dismissed && !isStandalone) {
        setTimeout(function() {
          installBanner.classList.add('show');
        }, 3000);
      }
    });

    if (installBtn) {
      installBtn.addEventListener('click', function() {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(function(result) {
            if (result.outcome === 'accepted') {
              installBanner.classList.remove('show');
            }
            deferredPrompt = null;
          });
        }
      });
    }

    if (dismissBtn) {
      dismissBtn.addEventListener('click', function() {
        installBanner.classList.remove('show');
        localStorage.setItem('pwa_install_dismissed', 'true');
      });
    }

    // ── PWA : Mise à jour automatique ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        var updateBanner = document.getElementById('update-banner');
        if (updateBanner) {
          updateBanner.classList.add('show');
          updateBanner.addEventListener('click', function() {
            window.location.reload();
          });
        }
      });
    }

    // ── Sécurité : Empêcher l'accès direct à /admin depuis l'URL ──
    // (L'admin est sur /admin/ et nécessite une authentification)
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
