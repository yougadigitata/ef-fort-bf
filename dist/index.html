<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="EF-FORT.BF - Preparation aux concours directs de la Fonction Publique du Burkina Faso">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1A5C38">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EF-FORT">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>EF-FORT.BF - Concours Burkina Faso</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #1A5C38;
      overflow: hidden;
    }
    .loading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(180deg, #1A5C38 0%, #0E3D24 100%);
    }
    .loading img {
      width: 120px;
      height: 120px;
      border-radius: 20px;
      background: white;
      padding: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .loading p {
      color: #D4A017;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      margin-top: 20px;
      letter-spacing: 1px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      margin-top: 16px;
      border: 3px solid rgba(212,160,23,0.3);
      border-top: 3px solid #D4A017;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <img src="icons/Icon-192.png" alt="EF-FORT.BF">
    <p>Chargement...</p>
    <div class="spinner"></div>
  </div>
  <!-- ════════════════════════════════════════════════════
       EF-FORT.BF — Web Audio API : Cloche sonore examen
       Fonctions appelées depuis Flutter via js_interop
       ════════════════════════════════════════════════════ -->
  <script>
    // ── Cloche sonore via Web Audio API ──
    window.effortPlayBell = function(frequency, durationSec) {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Oscillateur principal (fondamentale)
        var osc1 = ctx.createOscillator();
        var gainNode1 = ctx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(frequency, ctx.currentTime);
        gainNode1.gain.setValueAtTime(0.6, ctx.currentTime);
        gainNode1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + durationSec);
        osc1.connect(gainNode1);
        gainNode1.connect(ctx.destination);
        
        // Harmonique (octave supérieure pour la brillance)
        var osc2 = ctx.createOscillator();
        var gainNode2 = ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(frequency * 2, ctx.currentTime);
        gainNode2.gain.setValueAtTime(0.3, ctx.currentTime);
        gainNode2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + durationSec * 0.7);
        osc2.connect(gainNode2);
        gainNode2.connect(ctx.destination);

        // Harmonique tierce (couleur sonore)
        var osc3 = ctx.createOscillator();
        var gainNode3 = ctx.createGain();
        osc3.type = 'triangle';
        osc3.frequency.setValueAtTime(frequency * 1.5, ctx.currentTime);
        gainNode3.gain.setValueAtTime(0.15, ctx.currentTime);
        gainNode3.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + durationSec * 0.5);
        osc3.connect(gainNode3);
        gainNode3.connect(ctx.destination);
        
        osc1.start(ctx.currentTime);
        osc1.stop(ctx.currentTime + durationSec);
        osc2.start(ctx.currentTime);
        osc2.stop(ctx.currentTime + durationSec * 0.7);
        osc3.start(ctx.currentTime);
        osc3.stop(ctx.currentTime + durationSec * 0.5);
        
        // Libérer le contexte après la fin
        setTimeout(function() { 
          try { ctx.close(); } catch(e) {} 
        }, (durationSec + 0.5) * 1000);
        
      } catch(e) {
        console.warn('EF-FORT Bell error:', e);
      }
    };

    // ── Mélodie de bienvenue premium (3 notes ascendantes) ──
    window.effortPlayWelcomeMelody = function() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var notes = [
          { freq: 523.25, time: 0.0, dur: 0.35 },    // Do5
          { freq: 659.25, time: 0.25, dur: 0.35 },   // Mi5
          { freq: 783.99, time: 0.50, dur: 0.55 },   // Sol5
          { freq: 1046.5, time: 0.85, dur: 1.2 },    // Do6 (finale)
        ];
        notes.forEach(function(note) {
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(note.freq, ctx.currentTime + note.time);
          gain.gain.setValueAtTime(0.0, ctx.currentTime + note.time);
          gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + note.time + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + note.time + note.dur);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(ctx.currentTime + note.time);
          osc.stop(ctx.currentTime + note.time + note.dur);
        });
        setTimeout(function() { try { ctx.close(); } catch(e) {} }, 3000);
      } catch(e) {
        console.warn('EF-FORT Melody error:', e);
      }
    };

    // ── Double cloche (fin d'examen) ──
    window.effortPlayDoubleBell = function() {
      window.effortPlayBell(880, 1.5);
      setTimeout(function() { window.effortPlayBell(660, 2.0); }, 800);
    };

    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
