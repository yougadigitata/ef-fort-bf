name: ef_fort_bf
description: "EF-FORT.BF - Plateforme N1 de preparation aux concours directs de la Fonction Publique du Burkina Faso"
publish_to: 'none'
version: 5.2.0+8

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: 1.5.0
  shared_preferences: 2.5.3
  url_launcher: 6.3.1
  google_fonts: ^6.1.0
  audioplayers: ^5.2.1
  pdf: ^3.10.7
  printing: ^5.12.0
  flutter_math_fork: ^0.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/sounds/
    - assets/logo/
    - assets/fonts/
